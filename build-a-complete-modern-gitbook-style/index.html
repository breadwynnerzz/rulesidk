<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Brick City RP rules documentation.">
    <title>Brick City RP Rules</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=black-white-red">
  </head>
  <body>
    <div class="site-shell">
      <aside class="sidebar" id="sidebar" aria-label="Documentation navigation">
        <div class="sidebar-brand">
          <a class="brand-mark" href="#/" aria-label="Brick City RP home">
            <img src="assets/logo2.png" alt="Brick City RP logo">
          </a>
          <div>
            <strong>Brick City RP</strong>
            <span>Rules Documentation</span>
          </div>
        </div>

        <label class="sidebar-search" for="sidebar-filter">
          <span aria-hidden="true">⌕</span>
          <input id="sidebar-filter" type="search" placeholder="Find pages...">
        </label>

        <nav class="sidebar-nav" id="sidebar-nav"></nav>
      </aside>

      <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

      <main class="main-frame">
        <header class="topbar">
          <button class="icon-button mobile-menu" id="menu-toggle" type="button" aria-label="Open navigation">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <a class="topbar-title" href="#/">Documentation</a>

          <div class="topbar-actions">
            <button class="search-trigger" id="search-trigger" type="button" aria-label="Open search">
              <span>Search docs</span>
              <kbd>Ctrl</kbd><kbd>K</kbd>
            </button>
            <a class="quick-link" href="https://discord.gg/brickcityrp" target="_blank" rel="noreferrer">Discord</a>
            <a class="quick-link" href="https://brickcityrp.store" target="_blank" rel="noreferrer">Website</a>
          </div>
        </header>

        <div class="content-grid">
          <article class="doc-card">
            <div class="doc-progress" id="doc-progress"></div>
            <div class="page-transition" id="page-transition">
              <section class="markdown-body" id="content" aria-live="polite"></section>
              <footer class="doc-footer" id="doc-footer"></footer>
            </div>
          </article>

          <aside class="toc-panel" aria-label="On this page">
            <div class="toc-card">
              <strong>On this page</strong>
              <nav id="toc"></nav>
            </div>
          </aside>
        </div>
      </main>
    </div>

    <a class="discord-corner" href="https://discord.gg/brickcityrp" target="_blank" rel="noreferrer" aria-label="Join the Brick City RP Discord">
      <img src="assets/serveroverlay.png" alt="discord.gg/brickcityrp">
    </a>

    <section class="search-modal" id="search-modal" role="dialog" aria-modal="true" aria-labelledby="search-title" hidden>
      <div class="search-backdrop" data-close-search></div>
      <div class="search-box">
        <div class="search-input-row">
          <span aria-hidden="true">⌕</span>
          <input id="search-input" type="search" autocomplete="off" placeholder="Search rules, pages, and commands...">
          <button class="icon-button" type="button" data-close-search aria-label="Close search">×</button>
        </div>
        <h2 id="search-title" class="sr-only">Search documentation</h2>
        <div class="search-results" id="search-results"></div>
      </div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
